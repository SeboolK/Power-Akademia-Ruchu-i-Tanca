<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria | POWER Akademia</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html"><img src="images/logo.jpg" alt="Logo POWER Akademia" class="brand-logo"><span>POWER Akademia</span></a>
        <button class="menu-toggle" type="button" aria-label="Otwórz menu" aria-expanded="false">☰</button>
        <nav class="main-nav" aria-label="Główna nawigacja">
            <a href="index.html">Start</a><a href="onas.html">O nas</a><a href="aktualnosci.html">Aktualności</a><a class="active" href="galeria.html">Galeria</a><a href="zapisy.html">Zapisy</a><a href="kontakt.html">Kontakt</a>
        </nav>
    </header>

    <main>
        <section class="page-hero gallery-hero">
            <p class="eyebrow">Galeria</p>
            <h1>Zobacz energię POWER Akademii</h1>
        </section>

        <section class="section gallery-section">
            <div class="album-grid">
                <button class="album-card reveal" type="button" data-album="album1">
                    <img src="images/img4.jpg" alt="Power Przedszkole">
                    <span>Power Przedszkole</span>
                </button>
                <button class="album-card reveal" type="button" data-album="album2">
                    <img src="images/album2/img1.jpg" alt="Power Senior">
                    <span>Power Senior</span>
                </button>
                <button class="album-card reveal" type="button" data-album="album3">
                    <img src="images/img5.jpg" alt="Zabawa">
                    <span>Zabawa</span>
                </button>
                <button class="album-card reveal" type="button" data-album="album4">
                    <img src="images/album4/img1.jpg" alt="Party">
                    <span>Party</span>
                </button>
                <button class="album-card reveal" type="button" data-album="album5">
                    <img src="images/album5/img1.jpg" alt="Turnieje">
                    <span>Turnieje</span>
                </button>
                <button class="album-card reveal" type="button" data-album="album7">
                    <img src="images/album7/img1.jpg" alt="Maluchy Power Dance">
                    <span>Maluchy Power Dance</span>
                </button>
            </div>
        </section>
    </main>

    <div class="gallery-modal" id="photo-container" aria-hidden="true">
        <button class="modal-close" id="close-gallery" type="button" aria-label="Zamknij galerię">×</button>
        <div class="modal-photos" id="photos"></div>
    </div>

    <footer class="site-footer"><p>POWER Akademia Ruchu i Tańca | Rzeszów</p><div><a href="zapisy.html">Zapisy</a><a href="kontakt.html">Kontakt</a></div></footer>
</body>
</html>
